---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  test:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate - Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install flate
        uses: home-operations/flate/action@c2544f569380e766ef665abc7af685331c881117 # v0.4.11
        with:
          cache: true

      - name: Run flate test
        run: |
          flate test all \
            --path ./kubernetes/flux \
            --allow-missing-secrets

  diff:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate - Diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        resource:
          - hr
          - ks
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install flate
        uses: home-operations/flate/action@c2544f569380e766ef665abc7af685331c881117 # v0.4.11
        with:
          cache: true

      - name: Run flate diff
        id: diff
        run: |
          flate diff ${{ matrix.resource }} \
            --path ./kubernetes/flux \
            --allow-missing-secrets \
            -o github > diff.patch
          [ -s diff.patch ] && echo "has_diff=true" >> $GITHUB_OUTPUT || echo "has_diff=false" >> $GITHUB_OUTPUT

      # - name: Upload diff
      #   if: ${{ steps.diff.outputs.has_diff == 'true' }}
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: diff-${{ matrix.resource }}
      #     path: diff.patch

      - name: Truncate diff
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        run: |
          max_size=60000
          if [ $(wc -c < diff.patch) -gt $max_size ]; then
            truncate -s $max_size diff.patch
            echo "..." >> diff.patch
            echo "_(diff truncated)_" >> diff.patch
            # echo "_(diff truncated, full diff available as [workflow artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))_" >> diff.patch
          fi

      - if: ${{ steps.diff.outputs.has_diff == 'true' }}
        name: Add Comment
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: ${{ github.event.pull_request.number }}/kubernetes/${{ matrix.resource }}
          path: diff.patch
          message: |
            ```diff
            {{{content}}}
            ```

  success:
    if: ${{ !cancelled() }}
    needs:
      - test
      - diff
    name: Flate - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
