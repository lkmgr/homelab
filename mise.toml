[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
JUST_UNSTABLE = "1"
KUBECONFIG = "{{config_root}}/kubeconfig"
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
SOPS_CONFIG = "{{config_root}}/.sops.yaml"
TALOSCONFIG = "{{config_root}}/talosconfig"

[tools]
"python" = "3.14.5"
"uv" = "0.11.12"
"pipx" = "1.12.0"
"aqua:casey/just" = "1.51.0"
"aqua:charmbracelet/gum" = "0.17.0"
"aqua:cilium/cilium-cli" = "0.19.3"
"aqua:cloudflare/cloudflared" = "2026.3.0"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.8.7"
"aqua:getsops/sops" = "3.13.0"
"aqua:helm/helm" = "4.1.4"
"aqua:helmfile/helmfile" = "1.5.1"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubernetes-sigs/kustomize" = "5.7.1"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.0"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:siderolabs/talos" = "1.13.0"
doppler = { version = "3.76.0", exe = "doppler" }
