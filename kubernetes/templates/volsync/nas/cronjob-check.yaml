---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: "${APP}-restic-check"
spec:
  schedule: "0 2 * * 3"
  timeZone: "Etc/UTC"
  successfulJobsHistoryLimit: 0
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          initContainers:
            - name: jitter
              image: docker.io/library/busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
              imagePullPolicy: IfNotPresent
              command: ["sh", "-c", "sleep $(shuf -i 0-600 -n 1)"]
          containers:
            - name: restic
              image: restic/restic:0.19.1@sha256:136600b6ff6843d61d355f7f71f460a166429f35de6fd11b568fece3c9a4d510
              command: ["restic", "check", "--read-data"]
              envFrom:
                - secretRef:
                    name: "${APP}-volsync-secret"
              volumeMounts:
                - name: repository
                  mountPath: /mnt/repository
          restartPolicy: OnFailure
          volumes:
            - name: repository
              nfs:
                server: nas.internal
                path: /volume1/backups/volsync
