---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-victoria-logs
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps/monitoring/victoria-logs/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  targetNamespace: monitoring
  wait: true
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-victoria-logs-collector
  namespace: flux-system
spec:
  dependsOn:
    - name: cluster-apps-victoria-logs
  interval: 1h
  path: ./kubernetes/apps/monitoring/victoria-logs/collector
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  targetNamespace: monitoring
  wait: false
