---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: thanos
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: thanos
      version: 17.3.1
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    image:
      registry: quay.io
      repository: thanos/thanos
      tag: v0.41.0@sha256:cf3e9b292e4302ad4a4955b56379703aea39516607d382a57604a3d003c35d10
    global:
      security:
        allowInsecureImages: true
    existingObjstoreSecret: thanos-objstore
    queryFrontend:
      enabled: true
      replicaCount: 1
      resources:
        limits:
          cpu: 500m
    query:
      enabled: true
      extraFlags:
        - --query.auto-downsampling
      replicaCount: 1
      replicaLabel: ["__replica__"]
      dnsDiscovery:
        sidecarsService: kube-prometheus-stack-thanos-discovery
        sidecarsNamespace: monitoring
      resources:
        limits:
          memory: 512Mi
    bucketweb:
      enabled: true
      replicaCount: 1
    compactor:
      enabled: true
      extraFlags:
        - --delete-delay=30m
      retentionResolutionRaw: 14d
      retentionResolution5m: 60d
      retentionResolution1h: 90d
      persistence:
        enabled: true
        storageClass: openebs-hostpath
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 150Mi
        limits:
          cpu: 500m
          memory: 600Mi
    storegateway:
      enabled: true
      replicaCount: 1
      persistence:
        enabled: true
        storageClass: openebs-hostpath
        size: 10Gi
      resources:
        limits:
          memory: 512Mi
    ruler:
      enabled: true
      replicaCount: 1
      replicaLabel: __replica__
      alertmanagers: ["http://alertmanager-operated.monitoring.svc.cluster.local:9093"]
      extraFlags: ["--web.prefix-header=X-Forwarded-Prefix"]
      config: |-
        groups:
          - name: PrometheusWatcher
            rules:
              - alert: PrometheusDown
                annotations:
                  summary: A Prometheus has disappeared from Prometheus target discovery
                expr: absent(up{job="kube-prometheus-stack-prometheus"})
                for: 5m
                labels:
                  severity: critical
      persistence:
        enabled: true
        storageClass: openebs-hostpath
        size: 10Gi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
        default:
          absent_rules: true
          compaction: true
          query: true
          receive: false
          replicate: true
          ruler: true
          sidecar: true
          sidecarJobRegex: ".*kube-prometheus-stack-thanos-discovery.*"
          disabled:
            ThanosReceiveIsDown: true
