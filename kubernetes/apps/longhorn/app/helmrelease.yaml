---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: 1.11.2
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  values:
    persistence:
      defaultClass: true
      defaultFsType: ext4
      defaultClassReplicaCount: 2
      defaultDataLocality: best-effort
      reclaimPolicy: Delete
    defaultSettings:
      backupTarget: "nfs://${NAS_ADDR}:/volume1/backups/longhorn"
      createDefaultDiskLabeledNodes: true
      defaultDataPath: /mnt/nvme/longhorn
      defaultDataLocality: best-effort
      storageOverProvisioningPercentage: "200"
      storageMinimalAvailablePercentage: "15"
      storageReservedPercentageForDefaultDisk: "15"
      defaultReplicaCount: '{"v1":"2","v2":"2"}'
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      concurrentAutomaticEngineUpgradePerNodeLimit: "1"
      restoreVolumeRecurringJobs: false
      removeSnapshotsDuringFilesystemTrim: true
      v1DataEngine: true
      v2DataEngine: false
      orphanResourceAutoDeletion: replica-data
      orphanResourceAutoDeletionGracePeriod: "1800"
    # defaultBackupStore:
    #   pollInterval: 3600
    csi:
      attacherReplicaCount: 1
      provisionerReplicaCount: 1
      resizerReplicaCount: 1
      snapshotterReplicaCount: 1
    longhornUI:
      replicas: 1
    httproute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: networking
          sectionName: https
      hostnames: ["longhorn.${SECRET_DOMAIN}"]
