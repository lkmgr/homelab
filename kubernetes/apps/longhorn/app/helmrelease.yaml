---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  values:
    persistence:
      defaultClass: true
      defaultFsType: ext4
      defaultClassReplicaCount: 2
      defaultDataLocality: best-effort
      reclaimPolicy: Delete
    defaultSettings:
      concurrentAutomaticEngineUpgradePerNodeLimit: "1"
      createDefaultDiskLabeledNodes: true
      defaultDataLocality: best-effort
      defaultDataPath: /var/mnt/longhorn
      defaultReplicaCount: '{"v1":"2","v2":"2"}'
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      orphanResourceAutoDeletion: replica-data
      orphanResourceAutoDeletionGracePeriod: "1800"
      removeSnapshotsDuringFilesystemTrim: true
      restoreVolumeRecurringJobs: false
      snapshotHeavyTaskConcurrentLimit: "1"
      storageMinimalAvailablePercentage: "10"
      storageOverProvisioningPercentage: "200"
      storageReservedPercentageForDefaultDisk: "10"
      v1DataEngine: true
      v2DataEngine: false
    csi:
      attacherReplicaCount: 2
      provisionerReplicaCount: 2
      resizerReplicaCount: 2
      snapshotterReplicaCount: 2
    longhornUI:
      replicas: 1
    httproute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: networking
          sectionName: https
      hostnames: ["longhorn.${SECRET_DOMAIN}"]
