---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app larapaper
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
    - name: volsync
      namespace: volsync-system
  values:
    controllers:
      larapaper:
        containers:
          app:
            image:
              repository: ghcr.io/usetrmnl/larapaper
              tag: 0.36.2
            env:
              APP_KEY:
                secretKeyRef:
                  name: larapaper
                  key: APP_KEY
              APP_URL: "https://trmnl.${SECRET_DOMAIN}"
              PHP_OPCACHE_ENABLE: "1"
              REGISTRATION_ENABLED: "0"
              DB_DATABASE: "database/storage/database.sqlite"
              FORCE_HTTPS: "1"
    defaultPodOptions:
      securityContext:
        # runAsNonRoot: true
        # runAsUser: ${APP_UID}
        # runAsGroup: ${APP_GID}
        fsGroup: ${APP_GID}
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: 8080
    route:
      app:
        hostnames: ["trmnl.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      data:
        existingClaim: "${PVC_NAME}"
        globalMounts:
          - path: /var/www/html/database/storage
            subPath: database
          - path: /var/www/html/storage/app/public/images/generated
            subPath: storage
