---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-larapaper
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps/default/larapaper/app
  postBuild:
    substitute:
      APP: larapaper
      APP_GID: "82"
      APP_UID: "82"
      PVC_NAME: larapaper-data
      PVC_SIZE: 5Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  targetNamespace: default
  wait: false
