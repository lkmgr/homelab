---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: terminus
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
  values:
    controllers:
      terminus:
        strategy: Recreate
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/usetrmnl/terminus
              tag: 0.60.0
            env:
              TZ: "Europe/Berlin"
              APP_SETUP: "true"
              API_URI: "https://terminus.${SECRET_DOMAIN}"
              HANAMI_PORT: "2345"
              RACK_ATTACK_ALLOWED_SUBNETS: "10.42.0.0/16"
              KEYVALUE_URL: "redis://terminus-valkey:6379"
              DATABASE_URL:
                secretKeyRef:
                  name: terminus
                  key: DATABASE_URL
              APP_SECRET:
                secretKeyRef:
                  name: terminus
                  key: APP_SECRET
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 1Gi
          sidekiq:
            image:
              repository: ghcr.io/usetrmnl/terminus
              tag: 0.60.0
            command: ["bundle", "exec", "sidekiq", "-r", "./config/sidekiq.rb"]
            env:
              TZ: "America/New_York"
              API_URI: "https://terminus.${SECRET_DOMAIN}"
              RACK_ATTACK_ALLOWED_SUBNETS: "10.42.0.0/16"
              KEYVALUE_URL: "redis://terminus-valkey:6379"
              DATABASE_URL:
                secretKeyRef:
                  name: terminus
                  key: DATABASE_URL
              APP_SECRET:
                secretKeyRef:
                  name: terminus
                  key: APP_SECRET
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
      valkey:
        containers:
          valkey:
            image:
              repository: valkey/valkey
              tag: 8-alpine
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi
      postgres:
        pod:
          securityContext:
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
        containers:
          postgres:
            image:
              repository: postgres
              tag: 18.4-alpine
            env:
              POSTGRES_DB: terminus
              POSTGRES_USER: terminus
              POSTGRES_PASSWORD:
                secretKeyRef:
                  name: terminus
                  key: POSTGRES_PASSWORD
              PGDATA: /var/lib/postgresql/data/pgdata
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - pg_isready
                      - -U
                      - terminus
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - pg_isready
                      - -U
                      - terminus
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: false
    service:
      app:
        controller: terminus
        ports:
          http:
            port: 2345
      valkey:
        controller: valkey
        ports:
          redis:
            port: 6379
      postgres:
        controller: postgres
        ports:
          postgres:
            port: 5432
    route:
      app:
        hostnames: ["terminus.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      uploads:
        existingClaim: terminus-uploads
        advancedMounts:
          terminus:
            app:
              - path: /app/public/uploads
            sidekiq:
              - path: /app/public/uploads
      postgres-data:
        existingClaim: terminus-postgres
        advancedMounts:
          postgres:
            postgres:
              - path: /var/lib/postgresql/data
