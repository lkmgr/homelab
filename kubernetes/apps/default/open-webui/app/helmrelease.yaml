---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
    - name: volsync
      namespace: volsync-system
  values:
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.9.2@sha256:a7e4796ae894d1e2a0c1824860ade472f35c507608a01c3581377b5c19b0ed49
            env:
              TZ: "${TIMEZONE}"
              ENABLE_OLLAMA_API: false
              ENABLE_RAG_WEB_SEARCH: true
              RAG_WEB_SEARCH_ENGINE: "duckduckgo"
              ENABLE_WEBSOCKET_SUPPORT: true
              WEBSOCKET_REDIS_URL: "redis://localhost:6379/0"
              REDIS_URL: "redis://localhost:6379/0"
              WEBUI_AUTH_TRUSTED_EMAIL_HEADER: "Remote-Email"
              WEBUI_AUTH_TRUSTED_NAME_HEADER: "Remote-Name"
            envFrom:
              - secretRef:
                  name: open-webui-secret
            # resources:
            #   requests:
            #     cpu: 50m
            #     memory: 300Mi
          redis:
            image:
              repository: docker.io/valkey/valkey
              tag: 9.0.4@sha256:8436e10bc65c94886a91d4415b6a6dfa9cb5a306fb3b996e5bb67cd2b4854193
            ports:
              - containerPort: 6379
    service:
      app:
        controller: *app
        ports:
          http:
            port: 8080
    route:
      app:
        hostnames: ["chat.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      data:
        existingClaim: "${PVC_NAME}"
        globalMounts:
          - path: /app/backend/data
    networkpolicies:
      main:
        controller: open-webui
        policyTypes:
          - Ingress
        rules:
          ingress:
            - from:
                - namespaceSelector: {}
                  podSelector:
                    matchLabels:
                      app.kubernetes.io/name: envoy
