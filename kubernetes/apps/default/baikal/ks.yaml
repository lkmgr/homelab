---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-baikal
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps/default/baikal/app
  postBuild:
    substitute:
      APP: baikal
      APP_GID: "101"
      APP_UID: "101"
      PVC_NAME: baikal-data
      PVC_SIZE: 2Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  targetNamespace: default
  wait: false
