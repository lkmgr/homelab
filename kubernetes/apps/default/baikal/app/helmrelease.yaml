---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: baikal
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
    - name: volsync
      namespace: volsync-system
  values:
    controllers:
      baikal:
        containers:
          app:
            image:
              repository: docker.io/ckulka/baikal
              tag: 0.10.1-nginx
            env:
              APPLY_HOME_ASSISTANT_FIX: "true"
    defaultPodOptions:
      securityContext:
        # runAsNonRoot: true
        # runAsUser: ${APP_UID}
        # runAsGroup: ${APP_GID}
        fsGroup: ${APP_GID}
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: baikal
        ports:
          http:
            port: 80
    ingress:
      app:
        className: internal
        hosts:
          - host: "baikal.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    persistence:
      data:
        existingClaim: "${PVC_NAME}"
        globalMounts:
          - path: /var/www/baikal/Specific
            subPath: Specific
          - path: /var/www/baikal/config
            subPath: config
