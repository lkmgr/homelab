---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
  values:
    defaultPodOptions:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # TODO: Run as 1000:1000
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - helios
    controllers:
      home-assistant:
        containers:
          app:
            image:
              repository: ghcr.io/home-assistant/home-assistant
              tag: 2026.5.0@sha256:8edcb16cff8158e87a3a2b48b3bcca05c30dcea0212eb6a2fe940b6d52ed216a
            env:
              TZ: "${TIMEZONE}"
            # probes:
            #   liveness:
            #     enabled: false
            #   readiness:
            #     enabled: false
            #   startup:
            #     enabled: false
            resources:
              requests:
                memory: 750Mi
                cpu: 200m
              limits:
                memory: 2500Mi
          # appdaemon:
          #   image:
          #     repository: docker.io/acockburn/appdaemon
          #     tag: 4.5.13@sha256:cabcb3a4e739db2572ecb8dc3cee685300ab27274efda83a6d8ce4d3988dc647
          #   env:
          #     TZ: "${TIMEZONE}"
          code-server:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.114.0@sha256:14e279b1e741d58d99b8afb1b24fa6cb0a433a3edf58bf271720e4d4ace225af
            env:
              TZ: "${TIMEZONE}"
            args:
              - --auth
              - "none"
              - --user-data-dir
              - "/config/.vscode"
              - --extensions-dir
              - "/config/.vscode"
              - "--port"
              - "12321"
              - /config
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: home-assistant
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        annotations:
          lbipam.cilium.io/ips: "${VIP_HOME_ASSISTANT}"
        ports:
          mdns:
            port: 5353
            protocol: UDP
          coiot:
            port: 5683
            protocol: UDP
          http:
            port: 8123
          homekit:
            port: 21063
      code-server:
        controller: home-assistant
        ports:
          http:
            port: 12321
    route:
      app:
        hostnames: ["ha.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
      code-server:
        hostnames: ["ha-config.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        rules:
          - backendRefs:
              - identifier: code-server
                port: http
    persistence:
      config:
        existingClaim: "${PVC_NAME}"
        advancedMounts:
          home-assistant:
            app:
              - path: /config
            # appdaemon:
            #   - path: /conf
            #     subPath: appdaemon
            code-server:
              - path: /config
      # Workaround for https://github.com/home-assistant/core/issues/133537
      temp:
        type: emptyDir
        advancedMounts:
          home-assistant:
            app:
              - path: /.dockerenv
                subPath: .dockerenv
