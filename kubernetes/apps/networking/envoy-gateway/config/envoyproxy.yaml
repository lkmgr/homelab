---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: config
spec:
  telemetry:
    metrics:
      prometheus: {}
  logging:
    level:
      default: info
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        container:
          image: mirror.gcr.io/envoyproxy/envoy:v1.38.0@sha256:8146b97ee61a42cd216514709e4e3198af75f014974e3d9f310aef9c901fcbdf
          resources:
            requests:
              cpu: 20m
              memory: 200Mi
            limits:
              memory: 1Gi
      envoyService:
        externalTrafficPolicy: Local
