---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: config
spec:
  telemetry:
    metrics:
      prometheus: {}
  logging:
    level:
      default: info
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        container:
          image: mirror.gcr.io/envoyproxy/envoy:v1.38.2@sha256:af7c3dfdbe10de65cb2db5839ce1adf8904ee41c9d372076d62acab43af6ec41
          resources:
            requests:
              cpu: 20m
              memory: 200Mi
            limits:
              memory: 1Gi
      envoyService:
        externalTrafficPolicy: Local
