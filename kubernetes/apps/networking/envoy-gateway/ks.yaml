---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-envoy-gateway
  namespace: flux-system
spec:
  targetNamespace: networking
  commonMetadata:
    labels:
      app.kubernetes.io/name: envoy-gateway
  healthChecks:
    - kind: CustomResourceDefinition
      apiVersion: apiextensions.k8s.io/v1
      name: gatewayclasses.gateway.networking.k8s.io
    - kind: CustomResourceDefinition
      apiVersion: apiextensions.k8s.io/v1
      name: gateways.gateway.networking.k8s.io
    - kind: CustomResourceDefinition
      apiVersion: apiextensions.k8s.io/v1
      name: httproutes.gateway.networking.k8s.io
  path: ./kubernetes/apps/networking/envoy-gateway/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: false
  interval: 30m
  timeout: 5m
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-envoy-gateway-config
  namespace: flux-system
spec:
  targetNamespace: networking
  commonMetadata:
    labels:
      app.kubernetes.io/name: envoy-gateway-config
  dependsOn:
    - name: cluster-apps-envoy-gateway
  path: ./kubernetes/apps/networking/envoy-gateway/config
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: false
  interval: 30m
  timeout: 5m
